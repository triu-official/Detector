<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Report{% endblock %}</title>
  <style>
    @page {
      size: A4;
      margin: 2cm;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      font-size: 10pt;
      line-height: 1.5;
      color: #111827;
      background-color: #ffffff;
      margin: 0;
      padding: 0;
    }

    h1 {
      font-size: 20pt;
      font-weight: bold;
      color: #111827;
      border-bottom: 2px solid #e5e7eb;
      padding-bottom: 5px;
      margin-top: 0;
      margin-bottom: 10px;
    }

    h2 {
      font-size: 14pt;
      font-weight: bold;
      color: #1d4ed8;
      border-bottom: 1px solid #e5e7eb;
      padding-bottom: 3px;
      margin-top: 20px;
      margin-bottom: 8px;
    }

    h3 {
      font-size: 12pt;
      font-weight: bold;
      margin-top: 15px;
      margin-bottom: 5px;
    }

    table.card-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 15px;
    }

    table.card-table td {
      padding: 5px 8px;
      vertical-align: top;
      border-bottom: 1px solid #e5e7eb;
      font-size: 10pt;
    }

    table.card-table tr:last-child td {
      border-bottom: none;
    }

    table.card-table td.label {
      font-weight: bold;
      width: 35%;
      color: #374151;
    }

    table.card-table td.value {
      color: #111827;
      word-break: break-word;
    }

    .card {
      background-color: #f9fafb;
      border: 1px solid #e5e7eb;
      padding: 12px;
      margin-bottom: 18px;
    }

    ul.bullet-list {
      margin: 4px 0;
      padding-left: 20px;
    }

    ul.bullet-list li {
      margin-bottom: 3px;
    }

    .score-safe {
      color: #16a34a;
      font-weight: bold;
    }

    .score-suspicious {
      color: #d97706;
      font-weight: bold;
    }

    .score-phishing {
      color: #dc2626;
      font-weight: bold;
    }

    .mono {
      font-family: "Courier New", Courier, monospace;
      font-size: 9pt;
    }

    .pill {
      display: inline;
      padding: 1px 6px;
      font-size: 9pt;
      background-color: #e5e7eb;
      color: #374151;
    }

    .muted {
      color: #6b7280;
    }

    .footer {
      margin-top: 30px;
      border-top: 1px solid #e5e7eb;
      padding-top: 10px;
      font-size: 8pt;
      color: #6b7280;
      text-align: center;
    }

    .page-break-before {
      page-break-before: always;
    }

    .avoid-break {
      page-break-inside: avoid;
    }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
